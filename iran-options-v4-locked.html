<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پلتفرم هوشمند اختیار معامله ایران — نسخه ۳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// بررسی لود شدن XLSX — اگر آفلاین باشد پیام می‌دهد
window.addEventListener('load', function() {
  if (typeof XLSX === 'undefined') {
    document.getElementById('xlsxWarning').style.display = 'block';
  }
});
</script>
<style>
/* ── TOKENS ─────────────────────────────────── */
:root{
  --bg0:#0d1117; --bg1:#161b22; --bg2:#1c2128; --bg3:#21262d;
  --bdr:#30363d; --bdr2:#21262d;
  --grn:#3fb950; --red:#f85149; --blu:#58a6ff;
  --ylw:#d29922; --pur:#bc8cff; --org:#ffa657;
  --t1:#e6edf3;  --t2:#8b949e;  --t3:#484f58;
  --gold:#d4a017;
  --r:8px; --rl:12px;
}
[data-theme=light]{
  --bg0:#f0f2f5; --bg1:#fff; --bg2:#fff; --bg3:#f6f8fa;
  --bdr:#d0d7de; --bdr2:#e8ecef;
  --t1:#1f2328; --t2:#656d76; --t3:#afb8c1;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tahoma',sans-serif;background:var(--bg0);color:var(--t1);
  direction:rtl;font-size:13px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* ── HEADER ──────────────────────────────────── */
.hdr{
  background:var(--bg1);border-bottom:1px solid var(--bdr);
  padding:10px 20px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  gap:10px;
}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-logo .icon{
  width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,#1a3a5c,#0d6efd);
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.hdr-logo h1{
  font-size:15px;font-weight:700;
  background:linear-gradient(135deg,var(--blu),var(--pur));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hdr-meta{font-size:11px;color:var(--t3)}
.hdr-acts{display:flex;gap:6px;align-items:center}

/* ── BUTTONS ─────────────────────────────────── */
.btn{
  padding:6px 13px;border-radius:var(--r);border:1px solid var(--bdr);
  background:var(--bg2);color:var(--t1);cursor:pointer;font-size:12px;
  font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px;
}
.btn:hover{background:var(--bg3);border-color:var(--blu)}
.btn-primary{background:var(--blu);border-color:var(--blu);color:#fff}
.btn-primary:hover{background:#4493d9;border-color:#4493d9}
.btn-success{background:var(--grn);border-color:var(--grn);color:#fff}
.btn-success:hover{background:#2ea043}
.btn-danger{background:var(--red);border-color:var(--red);color:#fff}
.btn-danger:hover{background:#da3633}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-icon{padding:5px 7px}

/* ── TABS ────────────────────────────────────── */
.tabs{
  background:var(--bg1);border-bottom:1px solid var(--bdr);
  display:flex;padding:0 20px;gap:2px;overflow-x:auto;
}
.tab{
  padding:9px 15px;border:none;background:none;color:var(--t2);
  cursor:pointer;font-size:12px;font-family:inherit;
  border-bottom:2px solid transparent;white-space:nowrap;
  transition:all .15s;display:flex;align-items:center;gap:5px;
}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--blu);border-bottom-color:var(--blu)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── LAYOUT ──────────────────────────────────── */
.main{padding:18px 20px;max-width:1600px;margin:0 auto}
.card{
  background:var(--bg2);border:1px solid var(--bdr);
  border-radius:var(--rl);padding:16px;margin-bottom:14px;
}
.card-title{
  font-size:13px;font-weight:600;margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
  border-bottom:1px solid var(--bdr2);padding-bottom:9px;
}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:900px){.g2,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── STAT CARDS ──────────────────────────────── */
.stat{
  background:var(--bg1);border:1px solid var(--bdr);
  border-radius:var(--r);padding:11px 13px;position:relative;overflow:hidden;
}
.stat::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%}
.stat.grn::before{background:var(--grn)}
.stat.red::before{background:var(--red)}
.stat.blu::before{background:var(--blu)}
.stat.gld::before{background:var(--gold)}
.stat-lbl{font-size:11px;color:var(--t2);margin-bottom:3px}
.stat-val{font-size:17px;font-weight:700}
.stat-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* ── FORM ────────────────────────────────────── */
.fg{margin-bottom:11px}
.lbl{font-size:11px;color:var(--t2);margin-bottom:3px;display:block}
.inp{
  width:100%;padding:7px 10px;background:var(--bg1);
  border:1px solid var(--bdr);border-radius:var(--r);
  color:var(--t1);font-size:12px;font-family:inherit;
  direction:rtl;transition:border-color .15s;
}
.inp:focus{outline:none;border-color:var(--blu)}
select.inp{cursor:pointer}

/* ── UPLOAD ZONE ─────────────────────────────── */
.drop{
  border:2px dashed var(--bdr);border-radius:var(--rl);
  padding:36px 20px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--bg1);
}
.drop:hover,.drop.over{border-color:var(--blu);background:rgba(88,166,255,.05)}
.drop-icon{font-size:40px;margin-bottom:10px}
.drop-txt{color:var(--t2);font-size:13px}
.drop-sub{color:var(--t3);font-size:11px;margin-top:5px}

/* ── FILE CHIPS ──────────────────────────────── */
.chip{
  background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;
  padding:7px 11px;display:flex;align-items:center;gap:8px;font-size:12px;
}
.chip-name{font-weight:600;flex:1;word-break:break-all}
.chip-meta{color:var(--t2);font-size:11px;white-space:nowrap}
.chip-del{cursor:pointer;color:var(--t3);transition:color .15s}
.chip-del:hover{color:var(--red)}

/* ── PROGRESS ────────────────────────────────── */
.prog{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-top:8px}
.prog-bar{height:100%;background:var(--blu);border-radius:3px;transition:width .3s}
.prog-txt{font-size:10px;color:var(--t3);margin-top:4px}

/* ── SYMBOL PRICE ─────────────────────────────── */
.sym-price-row{
  display:flex;align-items:center;gap:8px;
  background:var(--bg1);border:1px solid var(--bdr);
  border-radius:var(--r);padding:6px 11px;
}
.sym-price-row .sym-name{font-weight:700;min-width:65px}
.sym-price-row input{
  width:110px;background:var(--bg2);border:1px solid var(--bdr);
  border-radius:5px;padding:4px 8px;color:var(--t1);
  font-family:inherit;font-size:12px;text-align:center;
}
.sym-price-row input:focus{outline:none;border-color:var(--blu)}
.sym-price-row .unit{font-size:11px;color:var(--t3)}

/* ── TABLE ───────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  background:var(--bg1);padding:8px 9px;text-align:right;
  font-weight:600;color:var(--t2);border-bottom:1px solid var(--bdr);
  white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--t1)}
tbody tr{border-bottom:1px solid var(--bdr2);transition:background .1s}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:7px 9px;vertical-align:middle}
.no-data{text-align:center;padding:30px;color:var(--t3);font-size:13px}

/* ── TAGS ────────────────────────────────────── */
.tag{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:10px;font-weight:600;
}
.tag-call{background:rgba(63,185,80,.15);color:var(--grn)}
.tag-put{background:rgba(248,81,73,.15);color:var(--red)}
.tag-bull{background:rgba(63,185,80,.12);color:var(--grn)}
.tag-bear{background:rgba(248,81,73,.12);color:var(--red)}
.tag-debit{background:rgba(88,166,255,.12);color:var(--blu)}

/* ── COLORS ──────────────────────────────────── */
.pos{color:var(--grn);font-weight:600}
.neg{color:var(--red);font-weight:600}
.neu{color:var(--blu)}

/* ── SCORE BAR ───────────────────────────────── */
.sbar{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-top:3px}
.sfill{height:100%;border-radius:2px;transition:width .3s}

/* ── EMPTY STATE ─────────────────────────────── */
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty .icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:13px}

/* ── TOAST ───────────────────────────────────── */
.toast-box{
  position:fixed;bottom:18px;left:18px;z-index:2000;
  display:flex;flex-direction:column;gap:7px;
}
.toast{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:9px 14px;font-size:12px;display:flex;align-items:center;gap:7px;
  min-width:190px;animation:tin .2s ease;
}
.toast.ok{border-right:3px solid var(--grn)}
.toast.err{border-right:3px solid var(--red)}
.toast.inf{border-right:3px solid var(--blu)}
@keyframes tin{from{transform:translateX(-16px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tout{to{transform:translateX(-16px);opacity:0}}

/* ── FILTER BAR ──────────────────────────────── */
.fbar{
  display:flex;gap:7px;flex-wrap:wrap;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--bdr2);margin-bottom:11px;
}
.fbar-label{font-size:11px;color:var(--t3)}

/* ── MODAL ───────────────────────────────────── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:1000;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);
  padding:22px;width:90%;max-width:660px;max-height:90vh;overflow-y:auto;
  position:relative;
}
.modal-ttl{font-size:14px;font-weight:700;margin-bottom:14px;
  padding-bottom:11px;border-bottom:1px solid var(--bdr)}
.modal-x{
  position:absolute;top:14px;left:14px;background:none;border:none;
  color:var(--t2);cursor:pointer;font-size:17px;padding:3px;
}
.modal-x:hover{color:var(--red)}

/* ── SECTION HEADER ──────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.sec-ttl{font-size:14px;font-weight:700}

/* ── RANK BADGE ──────────────────────────────── */
.rank{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:800;
  background:var(--gold);color:#000;
}
.rank.r1{background:var(--gold)}
.rank.r2{background:#c0c0c0;color:#333}
.rank.r3{background:#cd7f32;color:#fff}

/* ── V2 ADDITIONS ────────────────────────────── */
.tag-credit{background:rgba(63,185,80,.12);color:var(--grn)}
.tag-debit{background:rgba(248,81,73,.12);color:var(--red)}
.warn-box{
  background:rgba(210,153,34,.08);border:1px solid rgba(210,153,34,.3);
  border-radius:var(--r);padding:10px 13px;font-size:11px;color:var(--ylw);
  margin-top:10px;
}
.warn-box summary{cursor:pointer;font-weight:600;list-style:none}
.warn-box summary::before{content:'⚠️ ';margin-left:4px}
.warn-item{padding:3px 0;border-bottom:1px solid rgba(210,153,34,.15);color:var(--t2)}
.warn-item:last-child{border:none}
/* payoff chart inside modal */
#payoffCanvas{width:100%;height:180px;display:block;border-radius:var(--r);
  background:var(--bg1);border:1px solid var(--bdr2);margin-top:10px;
  touch-action:none;cursor:crosshair}

/* ── column visibility panel ─────────────────── */
.col-panel{position:absolute;top:36px;right:0;z-index:30;background:var(--bg2);
  border:1px solid var(--bdr2);border-radius:var(--r);padding:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);min-width:260px}
.col-panel label{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;white-space:nowrap}
.col-panel input[type=checkbox]{margin:0}
#rTbl.hide-cls   .col-cls,
#rTbl.hide-side  .col-side,
#rTbl.hide-legs  .col-legs,
#rTbl.hide-dte   .col-dte,
#rTbl.hide-ddte  .col-ddte,
#rTbl.hide-cap   .col-cap,
#rTbl.hide-mp    .col-mp,
#rTbl.hide-ml    .col-ml,
#rTbl.hide-be    .col-be,
#rTbl.hide-rr    .col-rr,
#rTbl.hide-rte   .col-rte,
#rTbl.hide-iv    .col-iv,
#rTbl.hide-pop   .col-pop,
#rTbl.hide-liq   .col-liq,
#rTbl.hide-score .col-score,
#rTbl.hide-opp   .col-opp{display:none}

/* ── V3-A ADDITIONS ──────────────────────────── */
.mode-bar{display:flex;gap:4px;background:var(--bg0);border-radius:var(--r);padding:3px}
.mode-btn{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;
  font-size:11px;font-family:inherit;font-weight:600;
  background:none;color:var(--t2);transition:all .15s}
.mode-btn.active{background:var(--bg2);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.mode-btn.buy.active{color:var(--grn)}
.mode-btn.sell.active{color:var(--red)}
.mode-btn.combined.active{color:var(--blu)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.dash-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);
  padding:13px 14px;cursor:pointer;transition:border-color .15s,transform .1s;
  position:relative;overflow:hidden}
.dash-card:hover{border-color:var(--blu);transform:translateY(-1px)}
.dash-card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%}
.dash-card.buy::before{background:var(--grn)}
.dash-card.sell::before{background:var(--red)}
.dash-card.neutral::before{background:var(--blu)}
.dash-card.soon::before{background:var(--t3)}
.dash-card-lbl{font-size:10px;color:var(--t3);margin-bottom:4px;letter-spacing:.4px}
.dash-card-sym{font-size:15px;font-weight:800;color:var(--t1)}
.dash-card-val{font-size:11px;color:var(--t2);margin-top:3px}
.dash-card-score{position:absolute;top:10px;left:10px;font-size:12px;font-weight:800;color:var(--gold)}
.dash-card.soon .dash-card-sym{color:var(--t3);font-size:12px}
.wl-chip{display:inline-flex;align-items:center;gap:5px;
  background:var(--bg1);border:1px solid var(--bdr);
  border-radius:6px;padding:4px 9px;font-size:12px;font-weight:600}
.wl-chip .del{cursor:pointer;color:var(--t3);font-size:10px}
.wl-chip .del:hover{color:var(--red)}
.rank-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.rank-row label{width:110px;font-size:11px;color:var(--t2);flex-shrink:0}
.rank-row input[type=range]{flex:1;accent-color:var(--blu)}
.rank-val{width:36px;text-align:center;font-size:11px;font-weight:700;
  color:var(--t1);background:var(--bg1);border:1px solid var(--bdr);
  border-radius:4px;padding:2px 4px}
.rank-total{font-size:12px;font-weight:700;padding:5px 10px;border-radius:var(--r);
  display:inline-block;margin-top:4px}
.rank-total.ok{background:rgba(63,185,80,.15);color:var(--grn)}
.rank-total.err{background:rgba(248,81,73,.15);color:var(--red)}
th.sort-asc::after{content:' ▲';font-size:9px;color:var(--blu)}
th.sort-desc::after{content:' ▼';font-size:9px;color:var(--blu)}
.tag-vertical{background:rgba(88,166,255,.12);color:var(--blu)}
.tag-single{background:rgba(188,140,255,.12);color:var(--pur)}
.hte-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;
  background:rgba(212,160,23,.15);color:var(--gold);font-weight:600}
.opp-label{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;
  background:rgba(63,185,80,.2);color:var(--grn);margin-top:4px}
.opp-label.rare{background:rgba(212,160,23,.2);color:var(--gold)}
.opp-label.conviction{background:rgba(88,166,255,.2);color:var(--blu)}
/* ── LOCK SCREEN STYLES (appended to head <style>) ───────── */
.lock-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lock-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--rl);
  padding:32px 28px;max-width:360px;width:100%;text-align:center;
  box-shadow:0 12px 40px rgba(0,0,0,.35)}
.lock-icon{font-size:36px;margin-bottom:10px}
.lock-title{font-size:16px;font-weight:800;color:var(--t1);margin-bottom:4px}
.lock-sub{font-size:12px;color:var(--t2);margin-bottom:20px}
.lock-input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
  color:var(--t1);padding:10px 12px;font-size:14px;text-align:center;margin-bottom:12px;
  direction:ltr;font-family:Tahoma,sans-serif}
.lock-input::placeholder{direction:rtl;text-align:center;unicode-bidi:plaintext}
.lock-input:focus{outline:none;border-color:var(--blu)}
.lock-btn{width:100%;background:var(--blu);color:#fff;border:none;border-radius:var(--r);
  padding:10px;font-size:14px;font-weight:700;cursor:pointer}
.lock-btn:hover{opacity:.9}
.lock-err{color:var(--red);font-size:12px;margin-top:10px}
.lock-hint{color:var(--t2);font-size:12px;margin-top:10px}

</style>
</head>
<body data-theme="dark">

<div id="lockScreen" class="lock-wrap">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">پلتفرم هوشمند اختیار معامله ایران</div>
    <div class="lock-sub">برای ورود رمز عبور را وارد کنید</div>
    <input type="password" id="lockPwInput" class="lock-input" placeholder="رمز عبور" autocomplete="off">
    <button class="lock-btn" id="lockSubmitBtn">ورود</button>
    <div class="lock-err" id="lockErr" style="display:none">رمز عبور اشتباه است — دوباره تلاش کنید</div>
    <div class="lock-hint" id="lockHint" style="display:none">⏳ در حال بررسی...</div>
  </div>
</div>

<div id="appRoot" style="display:none"></div>

<div id="changePwBtn" style="display:none;position:fixed;bottom:14px;right:14px;z-index:999">
  <button class="btn btn-sm" style="background:var(--bg2);border:1px solid var(--bdr);font-size:11px" onclick="openChangePwModal()">🔒 تغییر رمز</button>
</div>

<div id="changePwModal" class="modal-bg" style="display:none">
  <div class="modal" style="max-width:380px">
    <div class="modal-ttl">تغییر رمز عبور</div>
    <button class="modal-x" onclick="closeChangePwModal()">✕</button>
    <p style="font-size:12px;color:var(--t2);margin-bottom:10px;line-height:1.7">
      یک رمز جدید وارد کنید. یک نسخه جدید از این فایل با رمز جدید دانلود می‌شود.
      فایلی که الان باز است تغییری نمی‌کند — باید فایل دانلودشده را جایگزین آن کنید.
    </p>
    <input type="password" id="newPw1" class="lock-input" placeholder="رمز جدید (حداقل ۴ کاراکتر)" style="margin-bottom:8px">
    <input type="password" id="newPw2" class="lock-input" placeholder="تکرار رمز جدید" style="margin-bottom:12px">
    <div id="changePwErr" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>
    <button class="lock-btn" onclick="doChangePassword()">ساخت و دانلود نسخه جدید</button>
  </div>
</div>

<script>

  const ITERATIONS  = 250000;

  let DECRYPTED_PAYLOAD = null; // { html, js } — فقط پس از ورود موفق در حافظه نگه داشته می‌شود

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }
  function b64ToUtf8(b64) {
    // atob() به‌تنهایی کاراکترهای چندبایتی UTF-8 (مثل فارسی) را درست رمزگشایی نمی‌کند
    return new TextDecoder('utf-8').decode(b64ToBytes(b64));
  }
  function bytesToB64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }

  async function deriveKey(password, saltBytes, usage) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: saltBytes, iterations: ITERATIONS, hash: 'SHA-256' },
      baseKey, { name: 'AES-GCM', length: 256 }, false, [usage]
    );
  }

  async function decryptWith(password, saltB64, ivB64, dataB64) {
    const salt = b64ToBytes(saltB64);
    const iv   = b64ToBytes(ivB64);
    const data = b64ToBytes(dataB64);
    const key  = await deriveKey(password, salt, 'decrypt');
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, data);
    return new TextDecoder().decode(plainBuf);
  }

  async function onSubmit() {
    const pwInput = document.getElementById('lockPwInput');
    const err  = document.getElementById('lockErr');
    const hint = document.getElementById('lockHint');
    const pw = pwInput.value;
    err.style.display  = 'none';
    hint.style.display = 'block';
    try {
      const text = await decryptWith(pw, SALT_B64, IV_B64, DATA_B64);
      const obj  = JSON.parse(text);
      DECRYPTED_PAYLOAD = obj;

      document.getElementById('appRoot').innerHTML = obj.html;
      const scr = document.createElement('script');
      scr.textContent = obj.js;
      document.body.appendChild(scr);

      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('appRoot').style.display = 'block';
      document.getElementById('changePwBtn').style.display = 'block';
    } catch (e) {
      hint.style.display = 'none';
      err.style.display  = 'block';
      pwInput.value = '';
      pwInput.focus();
    }
  }

  document.getElementById('lockSubmitBtn').addEventListener('click', onSubmit);
  document.getElementById('lockPwInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') onSubmit();
  });
  document.getElementById('lockPwInput').focus();

  // ── تغییر رمز و دانلود نسخه جدید — بدون نیاز به سرور یا ابزار خارجی ──
  window.openChangePwModal = function() {
    document.getElementById('newPw1').value = '';
    document.getElementById('newPw2').value = '';
    document.getElementById('changePwErr').style.display = 'none';
    document.getElementById('changePwModal').style.display = 'flex';
  };
  window.closeChangePwModal = function() {
    document.getElementById('changePwModal').style.display = 'none';
  };

  window.doChangePassword = async function() {
    const p1 = document.getElementById('newPw1').value;
    const p2 = document.getElementById('newPw2').value;
    const errEl = document.getElementById('changePwErr');
    errEl.style.display = 'none';

    if (!p1 || p1.length < 4) {
      errEl.textContent = 'رمز باید حداقل ۴ کاراکتر باشد';
      errEl.style.display = 'block';
      return;
    }
    if (p1 !== p2) {
      errEl.textContent = 'دو رمز یکسان نیستند';
      errEl.style.display = 'block';
      return;
    }
    if (!DECRYPTED_PAYLOAD) {
      errEl.textContent = 'خطا داخلی — محتوا در حافظه موجود نیست';
      errEl.style.display = 'block';
      return;
    }

    const newSalt = crypto.getRandomValues(new Uint8Array(16));
    const newIv   = crypto.getRandomValues(new Uint8Array(12));
    const key     = await deriveKey(p1, newSalt, 'encrypt');
    const enc     = new TextEncoder();
    const plaintext = JSON.stringify(DECRYPTED_PAYLOAD);
    const cipherBuf  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: newIv }, key, enc.encode(plaintext));

    const newSaltB64 = bytesToB64(newSalt);
    const newIvB64   = bytesToB64(newIv);
    const newDataB64 = bytesToB64(new Uint8Array(cipherBuf));

    // قالب کامل فایل را از روی نسخه‌ی رمزگشایی‌نشده‌ی خودش بازسازی می‌کنیم
    // نکته فنی: توکن‌های جستجو با الحاق رشته ساخته می‌شوند، نه به‌صورت رشته‌ی
    // ثابت یکپارچه — تا با جایگزینی build-time در تعریف بالای فایل تداخل نکنند
    var TAG_SALT = '@@' + 'SALT' + '@@';
    var TAG_IV   = '@@' + 'IV'   + '@@';
    var TAG_DATA = '@@' + 'DATA' + '@@';
    var TAG_SELF = '@@' + 'SELF' + '@@';

    const selfTemplate = b64ToUtf8(SELF_B64);
    const newFile = selfTemplate
      .split(TAG_SALT).join(newSaltB64)
      .split(TAG_IV).join(newIvB64)
      .split(TAG_DATA).join(newDataB64)
      .split(TAG_SELF).join(SELF_B64);

    const blob = new Blob([newFile], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'iran-options-v4-locked.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    closeChangePwModal();
    alert('فایل جدید با رمز جدید دانلود شد. آن را جایگزین فایل قبلی کنید و فایل قبلی را حذف کنید.');
  };
